    document.addEventListener("DOMContentLoaded", function() {
      "use strict";

      const dict = {
        en: { 
          title: "{C} is in shock: the most hardcore private video leaked online 🔥 Watch before it's deleted!!!", fallbackGeo: "The country",
          random: ["Leaked homemade tape caught on camera", "Amateur hidden cam footage exposed", "Exclusive amateur clip", "Uncensored leaked video"],

        }
        // ... (остальные языки из твоего оригинала копируются сюда 1 в 1)
      };

      const urlParams = new URLSearchParams(window.location.search);
      let userLang = (urlParams.get("lang") || navigator.language || navigator.userLanguage).slice(0, 2).toLowerCase();
      if (!dict[userLang]) userLang = 'en';
      const t = dict[userLang];

      function sanitizeCity(s) {
        if (!s) return "";
        s = String(s).trim();
        if (s.length < 2 || s.length > 40 || /[<>{}\[\]]/.test(s)) return "";
        return s.replace(/\s+/g, " ");
      }

      const cityParam = sanitizeCity(urlParams.get('city'));
      const displayCity = cityParam !== "" ? cityParam : t.fallbackGeo;
      const finalTitle = t.title.replace("{C}", displayCity);

      const setIfExist = (id, text) => { const el = document.getElementById(id); if(el) el.innerText = text; };
      setIfExist('t-mainTitle', finalTitle); document.title = finalTitle;
      
      const titleElements = document.querySelectorAll('.dynamic-text');
      titleElements.forEach(function(el, index) { if(t.random[index]) el.innerText = t.random[index]; });

      setIfExist('m-title', t.modal.title); setIfExist('m-desc', t.modal.desc);
      setIfExist('m-stay', t.modal.stay); setIfExist('m-leave', t.modal.leave);

      // Frame Loader
      const frame = document.getElementById("frame"), playBtn = document.querySelector(".xh-play-btn");
      if (playBtn) {
        const isClone = (urlParams.get("__cl") === "1"), isFast = (urlParams.get("__fast") === "1"), poster = urlParams.get("__poster"), cid = urlParams.get("var_2"), cr = urlParams.get("creative_id");

        if (!isClone) {
          playBtn.classList.add("ready");
          if (frame && cid && cr) {
            frame.src = `https://cdn.x0x.online/frames/${encodeURIComponent(cid)}/${encodeURIComponent(cr)}.webp`;
            frame.onload = () => frame.classList.add("is-ready");
          }
        } else {
          if (frame && (poster || (cid && cr))) {
            frame.src = poster || `https://cdn.x0x.online/frames/${encodeURIComponent(cid)}/${encodeURIComponent(cr)}.webp`;
            if (isFast) { frame.classList.add("is-ready"); playBtn.classList.add("ready"); }
            else { 
                setTimeout(() => { frame.classList.add("is-ready"); frame.classList.remove("loading-state"); playBtn.classList.add("ready"); }, 1500); 
            }
          }
        }
      }

      // Related Grid Previews
      const gridCid = urlParams.get("var_2");
      if (gridCid) {
        const thumbs = document.querySelectorAll('.related-grid img');
        thumbs.forEach((img, index) => {
          let r = Math.floor(Math.random() * 10) + 1;
          img.src = `https://cdn.x0x.online/frames/${encodeURIComponent(gridCid)}/${r}.webp`;
        });
      }
    });
  </script>
